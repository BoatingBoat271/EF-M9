<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de Recetas | Gourmet Go</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="google_translate_element" style="display: none"></div>

    <!-- Encabezado principal y buscador -->
    <header class="hero">
      <div class="container py-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-7">
            <p class="eyebrow">Gourmet Go</p>
            <h1 class="display-4 hero-title">Buscador de Recetas</h1>
            <p class="lead hero-subtitle">
              Explora ideas frescas para cocinar en minutos. Encuentra platos por
              ingrediente de forma simple y rapida.
            </p>
          </div>
          <div class="col-lg-5">
            <form
              id="searchForm"
              class="search-panel p-4"
              aria-label="Buscador de recetas"
            >
              <label for="recipeSearch" class="form-label">Buscar recetas</label>
              <input
                id="recipeSearch"
                type="text"
                name="q"
                class="form-control form-control-lg"
                placeholder="Busca por ingrediente..."
              />
              <button type="submit" class="btn btn-accent btn-lg w-100 mt-3">
                Buscar
              </button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <!-- Resultados -->
    <main class="container py-5">
      <section aria-labelledby="resultsTitle">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-4">
          <div>
            <p class="section-kicker mb-1">Resultados</p>
            <h2 id="resultsTitle" class="section-title">Recetas destacadas</h2>
            <p id="resultsMeta" class="mb-0 text-muted">Busca por ingrediente para ver recetas</p>
          </div>
        </div>

        <div id="resultsGrid" class="row g-4"></div>
      </section>
    </main>

    <div id="recipeDetailModal" class="recipe-detail-modal d-none" aria-hidden="true">
      <div class="recipe-detail-backdrop" data-close-detail="true"></div>
      <article class="recipe-detail-card" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
        <button id="detailCloseBtn" type="button" class="btn-close" aria-label="Cerrar"></button>
        <img id="detailImage" class="recipe-detail-image" src="" alt="Imagen de receta" />
        <h3 id="detailTitle" class="mt-3"></h3>
        <p id="detailMeta" class="text-muted mb-3"></p>
        <h4 class="h5">Ingredientes</h4>
        <ul id="detailIngredients" class="mb-3"></ul>
        <h4 class="h5">Preparación</h4>
        <p id="detailInstructions" class="mb-0"></p>
      </article>
    </div>

    <!-- Pie de pagina -->
    <footer class="footer">
      <div class="container py-4">
        <p class="mb-0">Prototype Sprint 2 · Gourmet Go</p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "auto",
            includedLanguages: "es,en",
            autoDisplay: true,
          },
          "google_translate_element"
        );

        setTimeout(() => {
          const combo = document.querySelector(".goog-te-combo");
          if (combo && combo.value !== "es") {
            combo.value = "es";
            combo.dispatchEvent(new Event("change"));
          }
        }, 1200);
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
